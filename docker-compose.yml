services:
  db:
    image: postgis/postgis:16-3.4
    container_name: turismoconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turismo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turismo}
      POSTGRES_DB: ${POSTGRES_DB:-turismoconnect}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turismo} -d ${POSTGRES_DB:-turismoconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
